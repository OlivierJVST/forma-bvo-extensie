<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>BVO Metrics – JVST</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; background: #fff; color: #1a1a1a; padding: 12px; }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .toolbar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    button { font-size: 12px; padding: 5px 10px; border: 1px solid #ccc; border-radius: 4px; background: #f5f5f5; cursor: pointer; color: #333; }
    button:hover { background: #e8e8e8; }
    button.primary { background: #0055a4; color: white; border-color: #0055a4; }
    select { font-size: 12px; padding: 5px 8px; border: 1px solid #ccc; border-radius: 4px; }
    .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
    .stat { background: #f7f7f7; border-radius: 4px; padding: 8px 10px; }
    .stat-label { font-size: 11px; color: #777; margin-bottom: 2px; }
    .stat-value { font-size: 18px; font-weight: 600; }
    .stat-unit { font-size: 11px; color: #999; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; font-weight: 600; font-size: 11px; color: #666; padding: 5px 6px; border-bottom: 1px solid #e5e5e5; }
    td { padding: 6px; border-bottom: 1px solid #f0f0f0; }
    tr:hover td { background: #fafafa; }
    .bar-wrap { display: flex; align-items: center; gap: 4px; }
    .bar-bg { flex: 1; height: 5px; background: #ebebeb; border-radius: 3px; overflow: hidden; min-width: 40px; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .section-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.04em; margin: 14px 0 6px; }
    .badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 500; }
    .status { font-size: 12px; color: #666; padding: 8px 0; text-align: center; line-height: 1.6; }
    .error { color: #c0392b; background: #fdf0ef; border-radius: 4px; padding: 8px; font-size: 12px; margin-top: 8px; }
    .export-row { display: flex; gap: 6px; margin-top: 12px; padding-top: 10px; border-top: 1px solid #eee; }
    .debug { font-size: 10px; color: #888; margin-top: 8px; padding: 6px; background: #f9f9f9; border-radius: 4px; word-break: break-all; white-space: pre-wrap; max-height: 180px; overflow-y: auto; }
    .login-box { text-align: center; padding: 2rem 1rem; }
    .login-box p { color: #666; margin-bottom: 1rem; font-size: 12px; line-height: 1.6; }
  </style>
</head>
<body>
<h1>BVO Metrics</h1>
<div id="content">
  <div class="login-box">
    <p>Log in met je Autodesk-account om de BVO-data van dit project op te halen.</p>
    <button class="primary" id="btn-login">Inloggen met Autodesk</button>
  </div>
</div>

<script>
const CLIENT_ID = 'PN9OI5HKCbXMCBKtrefrdXwuz3btcjpqnhKluhY1a1CcWetL';
const REDIRECT_URI = 'https://olivierjvst.github.io/forma-bvo-extensie/';
const SCOPES = 'data:read';

function base64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function generatePKCE() {
  const verifier = base64url(crypto.getRandomValues(new Uint8Array(32)));
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  return { verifier, challenge: base64url(digest) };
}

async function startLogin() {
  const { verifier, challenge } = await generatePKCE();
  sessionStorage.setItem('pkce_verifier', verifier);
  const state = base64url(crypto.getRandomValues(new Uint8Array(8)));
  sessionStorage.setItem('oauth_state', state);
  const url = new URL('https://developer.api.autodesk.com/authentication/v2/authorize');
  url.searchParams.set('response_type', 'code');
  url.searchParams.set('client_id', CLIENT_ID);
  url.searchParams.set('redirect_uri', REDIRECT_URI);
  url.searchParams.set('scope', SCOPES);
  url.searchParams.set('state', state);
  url.searchParams.set('code_challenge', challenge);
  url.searchParams.set('code_challenge_method', 'S256');
  window.location.href = url.toString();
}

async function handleCallback(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  const resp = await fetch('https://developer.api.autodesk.com/authentication/v2/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'authorization_code',
      client_id: CLIENT_ID,
      code,
      redirect_uri: REDIRECT_URI,
      code_verifier: verifier,
    })
  });
  if (!resp.ok) throw new Error('Token ophalen mislukt: ' + await resp.text());
  const data = await resp.json();
  sessionStorage.setItem('access_token', data.access_token);
  window.history.replaceState({}, '', REDIRECT_URI);
  await loadHubs(data.access_token);
}

async function formaGet(token, path) {
  const resp = await fetch('https://developer.api.autodesk.com' + path, {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  if (!resp.ok) throw new Error(path + ' → ' + resp.status + ': ' + await resp.text());
  return resp.json();
}

async function loadHubs(token) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="status">Hubs ophalen...</div>';
  try {
    const hubs = await formaGet(token, '/project/v1/hubs');
    if (!hubs.data?.length) {
      content.innerHTML = `<div class="error">Geen hubs gevonden voor dit account.</div>
        <div class="debug">${JSON.stringify(hubs, null, 2)}</div>`;
      return;
    }
    // Show hub + project selector
    let hubOptions = hubs.data.map(h =>
      `<option value="${h.id}">${h.attributes.name} (${h.id})</option>`
    ).join('');
    content.innerHTML = `
      <div class="toolbar">
        <select id="hub-select" style="flex:1;max-width:180px">${hubOptions}</select>
        <select id="project-select" style="flex:1;max-width:180px"><option>-- laadt --</option></select>
        <button class="primary" id="btn-load">&#8635; Ophalen</button>
        <select id="groupBy">
          <option value="building">Per gebouw</option>
          <option value="zone">Per zone</option>
          <option value="both">Beide</option>
        </select>
        <button id="btn-logout" style="color:#999;font-size:11px">Uitloggen</button>
      </div>
      <div id="metrics-content"><div class="status">Selecteer een hub en project.</div></div>
    `;
    document.getElementById('btn-logout').addEventListener('click', () => { sessionStorage.clear(); location.reload(); });
    document.getElementById('groupBy').addEventListener('change', renderTables);
    document.getElementById('hub-select').addEventListener('change', () => loadProjects(token));
    document.getElementById('btn-load').addEventListener('click', () => {
      const pid = document.getElementById('project-select').value;
      if (pid) loadMetrics(token, pid);
    });
    await loadProjects(token);
  } catch(e) {
    content.innerHTML = `<div class="error">${e.message}</div><div class="debug">${e.stack||''}</div>`;
  }
}

async function loadProjects(token) {
  const hubId = document.getElementById('hub-select').value;
  const ps = document.getElementById('project-select');
  ps.innerHTML = '<option>laden...</option>';
  try {
    const projects = await formaGet(token, `/project/v1/hubs/${hubId}/projects`);
    ps.innerHTML = projects.data.map(p =>
      `<option value="${p.id}">${p.attributes.name}</option>`
    ).join('');
  } catch(e) {
    ps.innerHTML = `<option>Fout: ${e.message}</option>`;
  }
}

let allData = [];

async function loadMetrics(token, projectId) {
  const mc = document.getElementById('metrics-content');
  mc.innerHTML = '<div class="status">Forma API aanroepen...</div>';
  allData = [];
  try {
    const cleanId = projectId.replace('b.', '');
    // Try Forma elements API
    const elements = await formaGet(token, `/forma/v1alpha/projects/${cleanId}/elements`);

    if (!elements?.elements?.length) {
      mc.innerHTML = `<div class="error">Geen elementen gevonden.</div>
        <div class="debug">${JSON.stringify(elements, null, 2).slice(0,800)}</div>`;
      return;
    }

    const buildings = elements.elements.filter(e =>
      e.properties?.category === 'building' ||
      e.urn?.includes('building') ||
      e.properties?.type === 'building'
    );

    mc.innerHTML = `<div class="status">${elements.elements.length} elementen, ${buildings.length} gebouwen gevonden...</div>`;

    if (!buildings.length) {
      mc.innerHTML = `<div class="error">Geen gebouwen gevonden. Elementen structuur:</div>
        <div class="debug">${JSON.stringify(elements.elements.slice(0,2), null, 2)}</div>`;
      return;
    }

    const results = await Promise.allSettled(buildings.map(async el => {
      const urn = el.urn || el.id;
      const metrics = await formaGet(token, `/forma/v1alpha/projects/${cleanId}/elements/${encodeURIComponent(urn)}/metrics`);
      const m = metrics?.builtInMetrics || metrics?.metrics || {};
      return {
        name: el.properties?.name || urn.split(':').pop(),
        zone: el.properties?.buildingUse || el.properties?.function || el.properties?.use || null,
        gfa: Math.round(m.grossFloorArea ?? m.gfa ?? 0),
        floors: m.numberOfFloors ?? m.floors ?? null,
        _raw: m,
      };
    }));

    allData = results.filter(r => r.status==='fulfilled' && r.value.gfa > 0).map(r => r.value);

    if (!allData.length && results.some(r => r.status==='fulfilled')) {
      const s = results.find(r => r.status==='fulfilled');
      mc.innerHTML = `<div class="error">Gebouwen gevonden maar BVO = 0.</div>
        <div class="debug">${JSON.stringify(s.value._raw, null, 2)}</div>`;
      return;
    }
    if (!allData.length) {
      const err = results.find(r => r.status==='rejected');
      mc.innerHTML = `<div class="error">Geen data. ${err?.reason?.message||''}</div>`;
      return;
    }
    renderTables();
  } catch(e) {
    mc.innerHTML = `<div class="error">${e.message}</div><div class="debug">${e.stack||''}</div>`;
  }
}

const ZONE_COLORS = { residential:'#2980b9', office:'#8e44ad', retail:'#27ae60', mixed:'#e67e22', parking:'#7f8c8d' };
const ZONE_LABELS = { residential:'Wonen', office:'Kantoor', retail:'Plint / commercieel', mixed:'Mix', parking:'Parkeren' };
function zoneLabel(k) { if (!k) return 'Onbekend'; const l=k.toLowerCase(); for (const [en,nl] of Object.entries(ZONE_LABELS)) if (l.includes(en)) return nl; return k; }
function zoneColor(k) { if (!k) return '#95a5a6'; const l=(k||'').toLowerCase(); for (const [en,c] of Object.entries(ZONE_COLORS)) if (l.includes(en)) return c; return '#95a5a6'; }

function renderTables() {
  if (!allData.length) return;
  const groupBy = document.getElementById('groupBy')?.value || 'building';
  const total = allData.reduce((s,b)=>s+b.gfa,0);
  const fd = allData.filter(b=>b.floors);
  const avgF = fd.length ? Math.round(fd.reduce((s,b)=>s+b.floors,0)/fd.length) : '—';
  const mc = document.getElementById('metrics-content');
  let html = `<div class="summary">
    <div class="stat"><div class="stat-label">Totaal BVO</div><div class="stat-value">${total.toLocaleString('nl-NL')}<span class="stat-unit"> m²</span></div></div>
    <div class="stat"><div class="stat-label">Gebouwen</div><div class="stat-value">${allData.length}</div></div>
    <div class="stat"><div class="stat-label">Gem. bouwlagen</div><div class="stat-value">${avgF}</div></div>
    <div class="stat"><div class="stat-label">Zones</div><div class="stat-value">${new Set(allData.map(b=>b.zone)).size}</div></div>
  </div>`;
  if (groupBy==='building'||groupBy==='both') {
    html += '<div class="section-title">Per gebouw</div><table><thead><tr><th>Naam</th><th>Zone</th><th>BVO (m²)</th><th>Aandeel</th></tr></thead><tbody>';
    for (const b of allData) {
      const p = total>0?Math.round(b.gfa/total*100):0, c=zoneColor(b.zone);
      html += `<tr><td style="font-weight:500">${b.name}</td><td><span class="badge" style="background:${c}22;color:${c}">${zoneLabel(b.zone)}</span></td><td>${b.gfa.toLocaleString('nl-NL')}</td><td><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${p}%;background:${c}"></div></div><span style="color:#888">${p}%</span></div></td></tr>`;
    }
    html += '</tbody></table>';
  }
  if (groupBy==='zone'||groupBy==='both') {
    const bz={};
    for (const b of allData) { const k=b.zone||'other'; if(!bz[k]) bz[k]={gfa:0,count:0}; bz[k].gfa+=b.gfa; bz[k].count++; }
    html += '<div class="section-title">Per zone</div><table><thead><tr><th>Zone</th><th>Geb.</th><th>BVO (m²)</th><th>Aandeel</th></tr></thead><tbody>';
    for (const [k,v] of Object.entries(bz)) {
      const p=total>0?Math.round(v.gfa/total*100):0, c=zoneColor(k);
      html += `<tr><td><span class="badge" style="background:${c}22;color:${c}">${zoneLabel(k)}</span></td><td>${v.count}</td><td>${v.gfa.toLocaleString('nl-NL')}</td><td><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${p}%;background:${c}"></div></div><span style="color:#888">${p}%</span></div></td></tr>`;
    }
    html += '</tbody></table>';
  }
  html += `<div class="export-row"><button id="btn-csv">CSV ↓</button><button id="btn-json">JSON kopiëren</button></div>`;
  mc.innerHTML = html;
  document.getElementById('btn-csv').addEventListener('click', () => {
    const rows=[['Naam','Zone','BVO (m2)','Bouwlagen']];
    for (const b of allData) rows.push([b.name,zoneLabel(b.zone),b.gfa,b.floors||'']);
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['\uFEFF'+rows.map(r=>r.join(';')).join('\n')],{type:'text/csv;charset=utf-8;'}));
    a.download='forma-bvo.csv'; a.click();
  });
  document.getElementById('btn-json').addEventListener('click', () => {
    navigator.clipboard.writeText(JSON.stringify(allData,null,2)).then(()=>alert('JSON gekopieerd.'));
  });
}

document.getElementById('btn-login')?.addEventListener('click', startLogin);
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const token = sessionStorage.getItem('access_token');
if (code) {
  handleCallback(code).catch(e => {
    document.getElementById('content').innerHTML = `<div class="error">Login mislukt: ${e.message}</div>`;
  });
} else if (token) {
  loadHubs(token);
}
</script>
</body>
</html>
